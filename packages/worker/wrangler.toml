name = "ravenscope"
main = "src/index.ts"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Route /api/* to the Worker before consulting static assets. Without this,
# the SPA fallback serves index.html for any unmatched path INCLUDING
# /api/auth/verify, and the Hono handler never runs. Observable as a 200
# with Content-Type: text/html on API endpoints (and no Set-Cookie on
# verify, breaking the magic-link flow).
run_worker_first = ["/api/*"]

[[durable_objects.bindings]]
name = "SESSION_INGEST_DO"
class_name = "SessionIngestDO"

[[durable_objects.bindings]]
name = "RATE_LIMIT_DO"
class_name = "RateLimitDO"

[[migrations]]
tag = "v1"
new_classes = ["SessionIngestDO", "RateLimitDO"]

[[d1_databases]]
binding = "DB"
database_name = "ravenscope"
database_id = "REPLACE_ME_AFTER_wrangler_d1_create"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "ravenscope-blobs"
# preview_bucket_name is only required for `wrangler dev --remote`; local dev
# synthesizes an in-memory R2 bucket.

[vars]
EMAIL_FROM = "no-reply@ravenscope.example.com"

# Secrets (set via `wrangler secret put`):
#   SESSION_SECRET — JSON map {"v1":"<32-byte-base64>"}
#   RESEND_API_KEY
