name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Don't run on docs-only changes. Adjust as needed.
    if: >
      !contains(github.event.head_commit.message, '[skip deploy]')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      # Materialize packages/worker/wrangler.toml from the committed
      # template. The real wrangler.toml is gitignored — each
      # deployment owns its own database_id, EMAIL_FROM, and
      # OPERATOR_EMAIL — so CI renders the template using repository
      # Variables before any wrangler subcommand runs.
      #
      # Configure these in Settings → Secrets and variables → Actions →
      # Variables (NOT Secrets — these aren't sensitive enough to need
      # log masking, and Variables are easier to audit):
      #   D1_DATABASE_ID     — UUID from `wrangler d1 list` (required)
      #   EMAIL_FROM         — verified Resend sender (required)
      #   OPERATOR_EMAIL     — daily-cap alert recipient ('' = disabled)
      - name: Render wrangler.toml from template
        env:
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          OPERATOR_EMAIL: ${{ vars.OPERATOR_EMAIL }}
        run: |
          set -euo pipefail
          TEMPLATE=packages/worker/wrangler.toml.example
          OUT=packages/worker/wrangler.toml
          [[ -n "$D1_DATABASE_ID" ]] || { echo "::error::D1_DATABASE_ID variable is required"; exit 1; }
          [[ -n "$EMAIL_FROM" ]] || { echo "::error::EMAIL_FROM variable is required"; exit 1; }
          # OPERATOR_EMAIL may legitimately be empty (alerts disabled).
          cp "$TEMPLATE" "$OUT"
          sed -i "s|REPLACE_ME_AFTER_wrangler_d1_create|${D1_DATABASE_ID}|" "$OUT"
          sed -i "s|^EMAIL_FROM = \".*\"|EMAIL_FROM = \"${EMAIL_FROM}\"|" "$OUT"
          sed -i "s|^OPERATOR_EMAIL = \".*\"|OPERATOR_EMAIL = \"${OPERATOR_EMAIL}\"|" "$OUT"
          echo "Rendered $OUT (database_id=$D1_DATABASE_ID, EMAIL_FROM=$EMAIL_FROM, OPERATOR_EMAIL=${OPERATOR_EMAIL:-<empty>})"

      # Cache the AS Lite tarball across deploys -- 61 MB pulled from a
      # GH release on every run otherwise. Key on the pinned version +
      # checksum so a bundle bump invalidates the cache automatically.
      - name: Cache AdvantageScope Lite bundle
        uses: actions/cache@v4
        with:
          path: packages/web/.advantagescope-cache
          key: advantagescope-${{ hashFiles('packages/web/advantagescope/version.txt', 'packages/web/advantagescope/checksums.txt') }}
      - run: pnpm fetch:advantagescope

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm build

      # Apply any pending D1 migrations BEFORE deploying the Worker so
      # the new bundle doesn't hit a missing column/table the instant it
      # goes live.
      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: d1 migrations apply DB --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: deploy
